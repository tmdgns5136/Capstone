<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>얼굴 인식 시스템</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: whitesmoke;
            display: flex; /* 플렉스 박스 사용 */
            flex-direction: column; /* 세로 정렬 */
            align-items: center;  /* 좌우 가운데 정렬 */
            justify-content: center; /* 상하 가운데 정렬 */
            min-height: 100vh; /* 화면 전체 높이 */
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .header-title {
            font-size: 2rem;
            color: black;
            margin-bottom: 10px;
        }
        .header-desc {
            color: gray;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 20px; 
            justify-content: center;
            margin-bottom: 30px;
        }

        .action-btn {
            flex: 1; 
            padding: 40px 20px;
            border-radius: 15px;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-icon { font-size: 3rem; margin-bottom: 15px; }
        .btn-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .btn-desc { font-size: 0.9rem; opacity: 0.9; }

        .btn-webcam { background: blue }
        .btn-upload { background: skyblue; }

        /* 결과 화면 */
        #result-area {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        #preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .result-btn-group {
            display: flex;
            gap: 10px;
        }

        .result-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        #deleteBtn {
            background: #ff6b6b;
            color: white;
        }

        /* 카메라 모달 */
        #camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        #webcam-video {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            margin-bottom: 20px;
            transform: scaleX(-1);
        }

        .modal-btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        #captureBtn {
            background: #4CAF50;
            color: white;
        }

        #closeModalBtn {
            background: #f44336;
            color: white;
        }

    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="header-title">얼굴 인식 시스템</h1>
        <p class="header-desc">웹캠 또는 사진 업로드를 통해 얼굴을 감지합니다</p>
    </div>

    <div class="card">
        <div class="button-group">
            <button class="action-btn btn-webcam" id="webcamBtn">
                <span class="btn-icon">📷</span>
                <span class="btn-title">웹캠 사용</span>
                <span class="btn-desc">얼굴인식 확인</span>
            </button>
            
            <button class="action-btn btn-upload" id="uploadBtn">
                <span class="btn-icon">⬆</span> 
                <span class="btn-title">사진 업로드</span>
            </button>
        </div>

        <!-- 결과 화면 -->
        <div id="result-area">
            <img id="preview-image" src="" alt="Preview">
            <div class="result-btn-group">
                <button class="result-btn" id="deleteBtn">삭제</button>
            </div>
        </div>
    </div>

    <!-- 웹캠 모달 -->
    <div id="camera-modal">
        <div class="modal-content">
            <h2>카메라 촬영</h2>
            <video id="webcam-video" playsinline autoplay></video>
            <div class="modal-btn-group">
                <button class="modal-btn" id="captureBtn">찰칵!</button>
                <button class="modal-btn" id="closeModalBtn">취소</button>
            </div>
        </div>
    </div>

    <!-- 숨겨진 파일 input -->
    <input type="file" id="real-input" accept="image/*" style="display: none;">

 <script>
        // --- 요소 가져오기 ---
        const webcamBtn = document.getElementById('webcamBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const realInput = document.getElementById('real-input');
        
        // 결과 화면 관련
        const resultArea = document.getElementById('result-area');
        const previewImage = document.getElementById('preview-image');
        const deleteBtn = document.getElementById('deleteBtn');

        // 모달창(촬영창) 관련
        const cameraModal = document.getElementById('camera-modal');
        const webcamVideo = document.getElementById('webcam-video');
        const captureBtn = document.getElementById('captureBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');

        let currentStream = null; // 카메라 꺼주기 위해 담아둘 변수

        // ==========================================
        // 기능 1: 웹캠 버튼 클릭 -> 모달창 열기
        // ==========================================
        webcamBtn.addEventListener('click', async function() {
            try {
                // 브라우저에게 카메라 권한 요청
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                webcamVideo.srcObject = stream;
                currentStream = stream;

                // 모달창을 보여줌 (CSS에서 display: flex로 설정되어야 함)
                cameraModal.style.display = 'flex';
                
            } catch (err) {
                console.error(err);
                alert("카메라 권한을 허용해주세요!");
            }
        });

        // ==========================================
        // 기능 2: 찰칵 버튼 클릭 -> 사진 찍고 모달 닫기
        // ==========================================
        captureBtn.addEventListener('click', function() {
            // 1. 가상의 도화지(canvas) 생성
            const canvas = document.createElement('canvas');
            canvas.width = webcamVideo.videoWidth;
            canvas.height = webcamVideo.videoHeight;
            const ctx = canvas.getContext('2d');

            // 2. 거울모드(좌우반전)로 그리기
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(webcamVideo, 0, 0);

            // 3. 그림을 이미지 주소로 변환
            const dataURL = canvas.toDataURL('image/png');

            // 4. 메인 화면에 이미지 보여주기
            previewImage.src = dataURL;
            resultArea.style.display = 'block';

            // 5. 정리 (모달 닫고 카메라 끄기)
            closeModal();
        });

        // ==========================================
        // 기능 3: 업로드 버튼 클릭 -> 파일 창 열기
        // ==========================================
        uploadBtn.addEventListener('click', function() {
            // 숨겨진 진짜 input을 대신 클릭
            realInput.click();
        });

        // 파일이 선택되었을 때
        realInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    resultArea.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // ==========================================
        // 공통 기능: 닫기 & 삭제
        // ==========================================
        
        // 모달창의 [취소] 버튼
        closeModalBtn.addEventListener('click', function() {
            closeModal();
        });

        // 결과 화면의 [X] 삭제 버튼
        deleteBtn.addEventListener('click', function() {
            resultArea.style.display = 'none'; // 결과창 숨김
            previewImage.src = "";             // 이미지 주소 삭제
            realInput.value = "";              // 파일 선택 값 초기화
        });

        // 카메라 끄고 모달 닫는 함수
        function closeModal() {
            cameraModal.style.display = 'none';
            if (currentStream) {
                // 영상 트랙을 찾아 정지시킴 (카메라 불 꺼짐)
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }
    </script>
</body>
</html>
